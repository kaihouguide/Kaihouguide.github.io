<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحرير – الدليل الشامل والمتقدم لاكتساب اللغة اليابانية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* PASTE ALL YOUR ORIGINAL CSS <style> CONTENT HERE */
    </style>
</head>
<body>

<button id="menu-toggle" aria-label="تبديل القائمة">☰</button>

<aside class="sidebar">
    <div class="sidebar-header">
        <span class="logo"><ruby>解放<rt>かいほう</rt></ruby></span>
        <span class="subtitle">دليل الانغماس الشامل</span>
    </div>
    <!-- The sidebar links will be automatically generated here by the script below -->
    <ul class="sidebar-nav" id="sidebar-nav"></ul>
</aside>

<main class="main-content">
    <div class="content-wrapper">
        
        <!-- ====== MODULAR SECTIONS SYSTEM ====== -->
        <!-- Just drop a new div here when you make a new html file -->
        <div data-include="sections/guide.html"></div>
        <div data-include="sections/kanji.html"></div>
        <div data-include="sections/reading.html"></div>
        <div data-include="sections/grammar.html"></div>
        <div data-include="sections/resources.html"></div>
        <div data-include="sections/routine.html"></div>
        <div data-include="sections/vn.html"></div>
        <div data-include="sections/monolingual.html"></div>
        <div data-include="sections/speaking.html"></div>
        <div data-include="sections/faq.html"></div>
        <!-- ===================================== -->

    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        // 1. Fetch external HTML files and inject them into the DOM
        const includes = document.querySelectorAll('[data-include]');
        for (const el of includes) {
            const file = el.getAttribute('data-include');
            try {
                const response = await fetch(file);
                if (response.ok) {
                    // Replace the placeholder div entirely with the fetched <section>
                    el.outerHTML = await response.text();
                } else {
                    console.error('File not found:', file);
                }
            } catch (err) {
                console.error('Error fetching file:', file);
            }
        }

        // 2. Auto-generate the Sidebar based on loaded sections
        const sidebarNav = document.getElementById('sidebar-nav');
        const sections = document.querySelectorAll('.content-section');
        
        sections.forEach(section => {
            const id = section.id;
            const h1 = section.querySelector('h1');
            
            // Prioritize data-nav-title attribute, otherwise grab H1 text (split by colon)
            const title = section.getAttribute('data-nav-title') || (h1 ? h1.innerText.split(':')[0].trim() : 'قسم جديد');
            
            const li = document.createElement('li');
            li.innerHTML = `<a href="#${id}" class="nav-link">${title}</a>`;
            sidebarNav.appendChild(li);
        });

        // 3. Initialize Sidebar click, mobile toggle, and scroll-spy events
        initNavigation();

        // 4. Handle direct URL anchor links on initial page load (e.g., mysite.com/#section-kanji)
        if (window.location.hash) {
            const target = document.querySelector(window.location.hash);
            if (target) {
                target.scrollIntoView();
            }
        }
    });

    function initNavigation() {
        const navLinks = document.querySelectorAll('.nav-link');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
        }
        
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                navLinks.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                if (window.innerWidth <= 992) sidebar.classList.remove('open');
            });
        });
        
        window.addEventListener('scroll', () => {
            let current = '';
            const sections = document.querySelectorAll('.content-section');
            
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= (sectionTop - 150)) {
                    current = section.getAttribute('id');
                }
            });
            
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) {
                    link.classList.add('active');
                }
            });
        });

        // Highlight first link initially
        if(navLinks.length > 0) {
            navLinks[0].classList.add('active');
        }
    }
</script>

</body>
</html>
